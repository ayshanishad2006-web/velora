<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Velora</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <img src="logo.png" class="logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Shop</a>
    <a href="cart.html">Cart</a>
    <a href="wishlist.html">Wishlist</a>
  </nav>
</header>

<!-- PRODUCT SECTION -->
<div class="product-page">

  <!-- LEFT IMAGE -->
  <div class="product-left">
    <img id="img">
  </div>

  <!-- RIGHT DETAILS -->
  <div class="product-right">

    <h2 class="brand">VELORA</h2>

    <h1 id="name"></h1>

    <p class="price">
      <span class="old">₹999</span>
      ₹<span id="price"></span>
      <span class="sale">Sale</span>
    </p>

    <p class="tax">Inclusive of all taxes</p>

    <!-- SIZE -->
    <div class="section">
      <h4>Size</h4>
      <div class="sizes">
        <button class="active">XS</button>
        <button>S</button>
        <button>M</button>
        <button>L</button>
        <button>XL</button>
      </div>
    </div>

    <!-- QUANTITY -->
    <div class="section">
      <h4>Quantity</h4>
      <div class="qty">
        <button onclick="dec()">-</button>
        <span id="qty">1</span>
        <button onclick="inc()">+</button>
      </div>
    </div>

    <!-- BUTTONS -->
    <button class="add" onclick="addToCart()">Add to cart</button>
    <button class="buy" onclick="buyNow()">BUY NOW</button>

  </div>

</div>

<!-- JAVASCRIPT -->
<script>

let product = JSON.parse(localStorage.getItem("viewProduct"));

if(product){
  document.getElementById("img").src = product.img;
  document.getElementById("name").innerText = product.name;
  document.getElementById("price").innerText = product.price;
}

/* Quantity */
let quantity = 1;

function inc(){
  quantity++;
  document.getElementById("qty").innerText = quantity;
}

function dec(){
  if(quantity > 1){
    quantity--;
    document.getElementById("qty").innerText = quantity;
  }
}

/* Add to cart */
function addToCart(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  product.qty = quantity;
  cart.push(product);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

/* Buy now */
function buyNow(){
  alert("Proceed to checkout");
  window.location.href = "checkout.html";
}

</script>

</body>
</html>
